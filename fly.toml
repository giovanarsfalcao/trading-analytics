# Fly.io Konfigurationsdatei
app = "trading-analytics-app" # Diesen Namen beim ersten 'fly launch' anpassen
primary_region = "fra" # Frankfurt (oder deine bevorzugte Region)

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb" # Erhöht von 256MB auf 1GB für ML-Modelle und Datenanalyse
  cpu_kind = "shared"
  cpus = 1
